version: '3.9'

services:

  # ========== PostgreSQL + PostGIS ==========
  postgres:
    image: postgis/postgis:16-3.4
    container_name: threat-db
    
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: threat_detection
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=postgis"
    
    ports:
      - "5432:5432"
    
    volumes:
      # Volumen para persistencia de datos
      - postgres_data:/var/lib/postgresql/data
    
    # Health check
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d threat_detection"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    # Recursos
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========== FastAPI Backend ==========
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: threat-api
    
    environment:
      # Base de datos
      DATABASE_URL: postgresql://admin:securepassword123@postgres:5432/threat_detection
      
      # JWT & Seguridad
      SECRET_KEY: tu-clave-secreta-super-segura-cambiar-en-produccion
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      
      # Embeddings
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      
      # Aplicación
      DEBUG: 'True'
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      
      # CORS
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8081
    
    ports:
      - "8000:8000"
    
    volumes:
      # Código en vivo (hot reload)
      - .:/app
      # Uploads persistentes
      - ./uploads:/app/uploads
      # Logs persistentes
      - ./logs:/app/logs
    
    depends_on:
      postgres:
        condition: service_healthy
    
    # Reiniciar automáticamente si falla
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Recursos
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: threat-detection-network
    driver: bridge

# ================================================================================
# COMANDOS ÚTILES:
# ================================================================================
#
# Iniciar servicios:
#   docker-compose up -d
#
# Ver estado de servicios:
#   docker-compose ps
#
# Ver logs:
#   docker-compose logs -f backend
#   docker-compose logs -f postgres
#
# Ejecutar comando en contenedor:
#   docker-compose exec backend python -c "from database.connection import init_db; init_db()"
#
# Detener servicios:
#   docker-compose stop
#
# Reiniciar servicios:
#   docker-compose restart
#
# Eliminar servicios y volúmenes:
#   docker-compose down -v
#
# Reconstruir imagen:
#   docker-compose build --no-cache
#
# Acceder a PostgreSQL:
#   docker-compose exec postgres psql -U admin -d threat_detection
#
# Crear backup de BD:
#   docker-compose exec postgres pg_dump -U admin threat_detection > backup.sql
#
# Restaurar backup:
#   docker-compose exec -T postgres psql -U admin threat_detection < backup.sql
#
# ================================================================================
