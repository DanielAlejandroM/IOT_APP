#Archivo para pode levantar varios contenedores juntos

#version: '3.9'

services:

  # Servicios:
  # PostgreSQL + PostGIS

  postgres:
    image: postgis/postgis:16-3.4
    container_name: threat-db

    # carga variables desde el archivo - usa las variables del .env

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"


    # guarda la bd en la pc, permite persistencia real
    volumes:
      - ./postgres_data:/var/lib/postgresql/data


    # verifica si la db está lista

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped



  # BACKEND API

  backend:
    build:
      context: ..
      dockerfile: devops/Dockerfile

    container_name: threat-api

    env_file:
      - ../.env

    ports:
      - "8000:8000"

    # hace que el codigo local reemplace al contenedor (hot reload)
    volumes:
      - ../backend:/app
      - ../backend/firebase.json:/app/firebase.json

    # el backend espera a la bd

    depends_on:
      postgres:
        condition: service_healthy
      # ai-service:
      #   condition: service_started

    restart: unless-stopped

    # valida el backend activo

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3


# Volúmenes

volumes:
  postgres_data:


# Red
# los contenedores se conectan, se comunican por el nombre

networks:
  default:
    name: threat-detection-network
    driver: bridge