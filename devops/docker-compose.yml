version: '3.9'

services:

  # ==============================
  # PostgreSQL + PostGIS
  # ==============================
  postgres:
    image: postgis/postgis:16-3.4
    container_name: threat-db

    env_file:
      - ../.env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped


  # ==============================
  # AI SERVICE (NLP / Embeddings)
  # ==============================
  ai-service:
    build:
      context: ..
      dockerfile: devops/Dockerfile.ai

    container_name: threat-ai

    env_file:
      - ../.env

    ports:
      - "8001:8001"

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 30s
      timeout: 10s
      retries: 3


  # ==============================
  # BACKEND API
  # ==============================
  backend:
    build:
      context: ..
      dockerfile: devops/Dockerfile

    container_name: threat-api

    env_file:
      - ../.env

    ports:
      - "8000:8000"

    # 🔥 SOLO desarrollo (hot reload)
    volumes:
      - ../backend:/app
      - ../backend/firebase.json:/app/firebase.json

    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3


# ==============================
# Volúmenes
# ==============================
volumes:
  postgres_data:


# ==============================
# Red
# ==============================
networks:
  default:
    name: threat-detection-network
    driver: bridge
