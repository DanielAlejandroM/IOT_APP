version: '3.9'

services:

  # ==============================
  # PostgreSQL + PostGIS
  # ==============================
  postgres:
    image: postgis/postgis:16-3.4
    container_name: threat-db

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: threat_detection

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d threat_detection"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped


  # ==============================
  # AI SERVICE (NLP / Embeddings)
  # ==============================
  ai-service:
    build:
      context: ..
      dockerfile: devops/Dockerfile.ai

    container_name: threat-ai

    ports:
      - "8001:8001"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/docs"]
      interval: 30s
      timeout: 10s
      retries: 3


  # ==============================
  # BACKEND API
  # ==============================
  backend:
    build:
      context: ..
      dockerfile: devops/Dockerfile

    container_name: threat-api

    environment:
      # DB
      DATABASE_URL: postgresql://admin:securepassword123@postgres:5432/threat_detection

      # AI SERVICE
      AI_SERVICE_URL: http://ai-service:8001

      # Seguridad
      SECRET_KEY: change-this-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

      # App
      DEBUG: "True"
      ENVIRONMENT: development
      LOG_LEVEL: INFO

      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8081

    ports:
      - "8000:8000"

    # 🔥 SOLO desarrollo (hot reload)
    volumes:
      - ../backend:/app
      - ../backend/firebase.json:/app/firebase.json

    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3


# ==============================
# Volúmenes
# ==============================
volumes:
  postgres_data:


# ==============================
# Red
# ==============================
networks:
  default:
    name: threat-detection-network
    driver: bridge